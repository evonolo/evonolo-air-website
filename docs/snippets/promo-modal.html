<!-- Promo Modal Snippet (Bootstrap 5, Animate.css) -->
<div class="modal fade" id="promoModal" tabindex="-1" aria-labelledby="promoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0">
        <h5 class="modal-title visually-hidden" id="promoModalLabel">Limitierte Aktion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
      </div>
      <div class="modal-body pt-0">
        <div class="px-3 pb-3 text-center">
          <span class="badge rounded-pill text-bg-success mb-2">Frühjahrsaktion</span>
          <h3 class="fw-bold mb-2">-20 % auf PV-Inspektion</h3>
          <p class="text-body-secondary mb-4">Sichere dir jetzt unser Angebot. Läuft ab in:</p>

          <div id="promoCountdown" class="d-flex justify-content-center gap-2 mb-4" aria-live="polite">
            <div class="timer-seg">
              <div class="timer-val" id="pc-hours">00</div>
              <div class="timer-label">Std</div>
            </div>
            <div class="timer-sep">:</div>
            <div class="timer-seg">
              <div class="timer-val" id="pc-min">00</div>
              <div class="timer-label">Min</div>
            </div>
            <div class="timer-sep">:</div>
            <div class="timer-seg">
              <div class="timer-val" id="pc-sec">00</div>
              <div class="timer-label">Sek</div>
            </div>
          </div>

          <a class="btn btn-success btn-lg w-100" href="/pv.html">Jetzt anfragen</a>
          <small class="d-block text-muted mt-2">Gültig bis Ende März 2026.</small>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  #promoModal .timer-seg { min-width: 84px; }
  #promoModal .timer-val {
    font-size: 2.25rem;
    line-height: 1;
    padding: .5rem .75rem;
    border-radius: .5rem;
    background: var(--bs-light);
    color: var(--bs-dark);
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
  }
  #promoModal .timer-label {
    font-size: .75rem;
    color: var(--bs-secondary-color);
    margin-top: .25rem;
  }
  #promoModal .timer-sep {
    font-size: 2rem;
    line-height: 1;
    padding: .25rem .25rem 0;
    color: var(--bs-secondary-color);
  }
</style>

<script>
  (function () {

    /* =========================
       KONFIG
    ========================= */

    var CAMPAIGN_ID = '2026-03'; // bei neuer Aktion ändern
    var STORAGE_KEY = 'promoFirstVisitTs_' + CAMPAIGN_ID;
    var SESSION_SHOWN_KEY = 'promoModalShown_' + CAMPAIGN_ID;

    // Enddatum (lokale Browser-Zeit)
    // Monat: 0=Jan, 1=Feb, 2=März
    var CAMPAIGN_END_TS = new Date(2026, 2, 31, 23, 59, 59).getTime();

    function safeNow() {
      return Date.now ? Date.now() : new Date().getTime();
    }

    function prefersReducedMotion() {
      return !!(window.matchMedia &&
              window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function removeStorageSafe(key) {
      try { localStorage.removeItem(key); } catch(e){}
      try { sessionStorage.removeItem(key); } catch(e){}
    }

    function readFirstVisitTs() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        var parsed = parseInt(raw, 10);
        if (isNaN(parsed)) return null;
        return parsed;
      } catch(e){ return null; }
    }

    function writeFirstVisitTs(ts) {
      try { localStorage.setItem(STORAGE_KEY, String(ts)); } catch(e){}
    }

    function getOrInitFirstVisitTs(now) {
      var existing = readFirstVisitTs();
      if (existing != null) return existing;
      writeFirstVisitTs(now);
      return now;
    }

    function canShowThisSession() {
      try { return sessionStorage.getItem(SESSION_SHOWN_KEY) !== '1'; }
      catch(e){ return true; }
    }

    function markShownThisSession() {
      try { sessionStorage.setItem(SESSION_SHOWN_KEY, '1'); } catch(e){}
    }

    function updateCountdown(endTs, onExpire) {
      var hEl = document.getElementById('pc-hours');
      var mEl = document.getElementById('pc-min');
      var sEl = document.getElementById('pc-sec');
      if (!hEl || !mEl || !sEl) return;

      function render() {
        var diff = Math.max(0, endTs - safeNow());
        var totalSec = Math.floor(diff / 1000);

        var hours = Math.floor(totalSec / 3600);
        var minutes = Math.floor((totalSec % 3600) / 60);
        var seconds = totalSec % 60;

        hEl.textContent = pad(hours);
        mEl.textContent = pad(minutes);
        sEl.textContent = pad(seconds);

        if (diff <= 0 && typeof onExpire === 'function') {
          onExpire();
        }
      }

      render();

      var iv = setInterval(function(){
        if (safeNow() >= endTs) {
          render();
          clearInterval(iv);
          return;
        }
        render();
      }, 1000);
    }

    /* =========================
       INIT (wartet auf Bootstrap)
    ========================= */

    function initPromo() {

      var now = safeNow();

      // Kampagne vorbei -> komplett deaktivieren
      if (now > CAMPAIGN_END_TS) {
        removeStorageSafe(STORAGE_KEY);
        removeStorageSafe(SESSION_SHOWN_KEY);
        return;
      }

      var modalEl = document.getElementById('promoModal');
      if (!modalEl) return;

      var tries = 0;

      (function waitForBootstrap(){

        if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {

          if (!canShowThisSession()) return;

          getOrInitFirstVisitTs(now);

          var endTs = CAMPAIGN_END_TS;
          if (safeNow() >= endTs) return;

          var promo = new bootstrap.Modal(modalEl, {
            backdrop: true,
            keyboard: true
          });

          modalEl.addEventListener('show.bs.modal', function () {
            if (prefersReducedMotion()) return;
            var dlg = modalEl.querySelector('.modal-dialog');
            if (dlg) dlg.classList.add('animate__animated','animate__fadeInDown');
          });

          modalEl.addEventListener('hidden.bs.modal', function () {
            var dlg = modalEl.querySelector('.modal-dialog');
            if (dlg) dlg.classList.remove('animate__animated','animate__fadeInDown');
          });

          updateCountdown(endTs, function(){
            try { promo.hide(); } catch(e){}
            markShownThisSession();
            removeStorageSafe(STORAGE_KEY);
            removeStorageSafe(SESSION_SHOWN_KEY);
          });

          setTimeout(function () {
            if (safeNow() >= endTs) return;
            promo.show();
            markShownThisSession();
          }, 5000);

          return;
        }

        tries++;
        if (tries < 40) setTimeout(waitForBootstrap, 50);

      })();
    }

    document.addEventListener('DOMContentLoaded', initPromo);

  })();
</script>
